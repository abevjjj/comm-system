name: Build Android APK

# 触发条件：push 到 main 分支且改动涉及 android 目录时自动构建；
# 也支持手动触发（workflow_dispatch），方便调试 CI 配置本身
on:
  push:
    branches: [ "main" ]
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "android/**"
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: 配置 Gradle（自动处理wrapper，含缓存加速）
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      - name: 生成 Gradle Wrapper（若缺失）
        working-directory: android
        run: |
          if [ ! -f "./gradlew" ] || [ ! -f "./gradle/wrapper/gradle-wrapper.jar" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: 构建 Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: comm-system-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 在 Job Summary 中展示构建信息
        if: success()
        run: |
          echo "### ✅ APK 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "构建产物已上传至 Artifacts，可在本次工作流运行页面下载。" >> $GITHUB_STEP_SUMMARY
          ls -la android/app/build/outputs/apk/debug/ >> $GITHUB_STEP_SUMMARY
